<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OC Financial Offline</title>
    <style>
      :root {
        --bg-deep: #0a1a2e;
        --primary: #226397;
        --aqua: #00f4fe;
        --maize: #ffec7c;
        --text: #f0f4f8;
        --muted: rgba(240, 244, 248, 0.7);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        border: 1px solid rgba(0, 244, 254, 0.25);
        border-radius: 16px;
        background: rgba(78, 68, 99, 0.25);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        padding: 28px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(0, 244, 254, 0.35);
        background: rgba(34, 99, 151, 0.25);
        color: var(--aqua);
        margin-top: 18px;
        font-weight: 600;
        font-size: 13px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--aqua);
        box-shadow: 0 0 0 6px rgba(0, 244, 254, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        OC Financial is having trouble connecting right now. If you were here earlier, some assets may still work.
        For the best experience, reconnect to the internet and try again.
      </p>
      <div class="chip"><span class="dot"></span> Ollie will be back online soon</div>
    </div>
  </body>
</html>
